# Пользовательские функции
functions:
  dh_object_to_text:
    title: Конвертирует объект в текст для создания поисковых индексов
    # Схема входящих параметров
    params:
      - alias: object
        type: object
        title: Объект конвертации
        required: true
      - type: object
        title: Объект конвертации
      - type: object
        title: Объект конвертации
    # Схема результата
    result:
      type: string
    # Код функции
    code: >
      (
        $
      )
  dh_deep_lookup:
    title: Получение значения вложенного ключа
    # Схема входящих параметров
    params:
      - alias: object
        type: object
        title: Объект для извлечения
        required: true
      - alias: path
        type: string
        title: Ссылка на вложенный ключ
    # Код функции
    code: >
      (
        $path := path;
        $object := object;

        $keys := $path ~> $split(".");

        $keys ~> $reduce(function($acc, $key) {
          $acc ? $lookup($acc, $key) : null
        }, $object)
      )

