docs:
  archtool.plugins.editable-table.editing.table_1:
    type: editable-table

    origin:
      body: >
        ($."archtool.plugins.editable-table.editing.data")

    headers:
      - value: name
        width: 200px
      - value: color
        type: select
        options:
          - value: red
          - value: blue
          - value: white
        width: 100px
    source: >
      (
          { "body": body }
      )

  archtool.plugins.editable-table.editing.table_2:
    type: editable-table
    new_row_allowed: false # Отключим создание новых строк
    origin:
      body: >
        ($."archtool.plugins.editable-table.editing.data")

    headers:
      - value: name
        width: 200px
      - value: color
        type: select
        options:
          - value: red
          - value: blue
          - value: white
        width: 100px
        editable: false # Отключено на портале
        save:
          path: data/test_data.yaml
    source: >
      (
          { "body": body }
      )

  archtool.plugins.editable-table.editing.table_3:
    type: editable-table
    new_row_allowed: false # Отключим создание новых строк
    origin:
      body: >
        ($."archtool.plugins.editable-table.editing.data")

    format: >
      (
          $key := $keys(file)[0];
          { $key: table }
      )

    headers:
      - value: name
        width: 200px
        save:
          path: data/data.yaml
      - value: color
        type: select
        options:
          - value: red
          - value: blue
          - value: white
        width: 100px
        editable: false # Отключено (ссылка на репозиторий на главной странице плагина)
        save:
          path: data/data.yaml
    source: >
      (
          { "body": body }
      )

  archtool.plugins.editable-table.editing.table_4:
    type: editable-table
    new_row_allowed: false # Отключим создание новых строк
    yaml:
      null_replace_string: "не заполнено"

    origin:
      body: >
        ($."archtool.plugins.editable-table.editing.data")

    format: >
      (
          $key := $keys(file)[0];
          { $key: table }
      )

    headers:
      - value: name
        width: 200px
        save:
          path: data/data.yaml
      - value: color
        type: select
        options:
          - value: red
          - value: blue
          - value: white
        width: 100px
        editable: false # Отключено (ссылка на репозиторий на главной странице плагина)
        save:
          path: data/data.yaml
    source: >
      (
          { "body": body }
      )
