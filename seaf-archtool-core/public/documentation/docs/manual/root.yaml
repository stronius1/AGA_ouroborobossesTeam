  archtool.technologies:
      location: SEAF.ArchTool/Руководство/Технологии
      description: Технологии
      type: markdown
      subjects:
        - archtool.front
        - archtool.front.spa
      source: technologies.md
  archtool.datasets:
      location: SEAF.ArchTool/Руководство/Источники данных
      description: Источники данных
      type: markdown
      source: datasets.md
      subjects:
        - archtool.front
        - archtool.front.spa
        - archtool.front.spa.dataset
  archtool.jsonata:
