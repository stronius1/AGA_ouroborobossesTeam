# Проверки полноты ADR (Architecture Decision Records).
# Эталонный шаблон: templates/adr-template.md (сам шаблон тоже эволюционирует).
schema: aga.rules/v1
domain: adr

rules:
  - id: ADR-001
    title: "Обязательные секции ADR присутствуют"
    statement: >
      ADR содержит секции: «## Контекст», «## Решение», «## Альтернативы»,
      «## Последствия». Отсутствие «Альтернатив» — самый частый дефект:
      решение без рассмотренных альтернатив не является решением.
    rationale: "Неполный ADR не позволяет пересмотреть решение через год."
    severity: major
    scope: [adr]
    check_type: deterministic
    detect: {required_sections: ["Контекст", "Решение", "Альтернативы", "Последствия"]}
    source_ref: "architecture/vendor/seaf-core/entities/change/adr/base.yaml#/entities/seaf.change.adr/schema"
    exceptions: []
    provenance: {origin: seed, added_in: 1.0.0}
    status: active

  - id: ADR-002
    title: "Статус ADR из допустимого словаря"
    statement: >
      Поле status принимает одно из значений: proposed, accepted,
      deprecated, superseded.
    rationale: "Самодельные статусы ломают автоматический учёт решений."
    severity: minor
    scope: [adr]
    check_type: deterministic
    detect: {field_in_vocab: {field: status, vocab: [proposed, accepted, deprecated, superseded]}}
    source_ref: "aga-skill/rules/adr-checks.yaml#/rules/1"
    exceptions: []
    provenance: {origin: seed, added_in: 1.0.0}
    status: active

  - id: ADR-003
    title: "Ссылки на АС валидны"
    statement: >
      Все системы, перечисленные в поле systems, существуют в реестре SEAF.
    rationale: "ADR о несуществующей системе невозможно привязать к ландшафту."
    severity: major
    scope: [adr]
    check_type: deterministic
    detect: {systems_field_must_exist: systems}
    source_ref: "architecture/vendor/seaf-core/entities/change/adr/base.yaml#/entities/seaf.change.adr/schema"
    exceptions: []
    provenance: {origin: seed, added_in: 1.0.0}
    status: active

  - id: ADR-004
    title: "Дата и автор решения указаны"
    statement: >
      Frontmatter ADR содержит заполненные поля date и author.
    rationale: "Анонимное решение без даты не имеет веса при разборе инцидентов."
    severity: minor
    scope: [adr]
    check_type: deterministic
    detect: {required_fields: [date, author]}
    source_ref: "aga-skill/rules/adr-checks.yaml#/rules/3"
    exceptions: []
    provenance: {origin: seed, added_in: 1.0.0}
    status: active
