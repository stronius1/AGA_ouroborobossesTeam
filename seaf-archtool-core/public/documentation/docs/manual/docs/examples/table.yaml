docs:
  archtool.table.preset:        # Табличный документ на основании предопределенных данных
    type: table               # Тип документа 
    headers:                  # Заголовки таблицы
      - value: id             # Идентификатор поля для вывода в колонке
        text: Идентификатор   # Заголовок колокнки
        sortable: true        # Производить сортировку по колонке
        align: left           # Форматирование по горизонтали
        width: 20%            # Ширина колонки 
      - value: payload
        text: Значение
        sortable: true
        align: left
    source:                     # Данные для таблицы (массив)
      - id: 1                 # Поде "id" 
        payload: Значение 1   # Значение поля "id"
      - id: 2
        payload: Значение 2
  archtool.table.select:        # Табличный документ на основании запроса к данным архитектуры
    type: table
    headers:
      - value: from
        text: Система 1
        sortable: true
        align: left
        width: 20%
        link: link-from       # Идентификатор поля, в котором хранится ссылка
      - value: to
        text: Система 2
        sortable: true
        align: left
        width: 20%
        link: link-to
      - value: direction
        text: Связь
        sortable: true
        align: center
        width: 5%
      - value: title
        text: Описание
        sortable: true
        align: left
      - value: contract
        text: Контракт
        sortable: true
        align: left
        link: link-contract
    source: >                   # JSONata запрос к архитектуре
      (
        $MANIFEST := $;
        $distinct([components.$spread().(
            $COMPONENT := $;
            $COMPONENT_ID := $keys()[0];
            $.*.links.{
                "from": $COMPONENT.*.title,
                "link-from": "/architect/components/" & $COMPONENT_ID,
                "to": id ? $lookup($MANIFEST.components, id).title : id,
                "link-to": "/architect/components/" & id,
                "contract": contract ? $lookup($MANIFEST.docs, contract).location : contract,
                "link-contract": "/docs/" & contract,
                "title": title,
                "direction": direction
            };
        )])^(from)
      )
  archtool.table.ex_jsonata:
    type: table
    headers:                  
      - value: id             
        text: Идентификатор   
        sortable: true        
        align: left           
        width: 20%            
        link: link
      - value: title
        text: Наименование
        sortable: true
        align: left
        link: link
    source: contexts.jsonata     # Файл с запросом JSONata
  archtool.table.ex_yaml:
    type: table               
    headers:                  
      - value: name             
        text: ФИО автора
        sortable: true        
        align: left           
        width: 100%            
    source: autors.yaml           # Файл с данными
  archtool.table.ex_http:
    type: table               
    headers:                  
      - value: title
        text: Name
        sortable: true        
        align: left           
    origin: https://labs.ft.com/tech-radar/demo.json   # Внешний ресурс
    source: showcases.jsonata     # Обработа данных внешнего ресурса
  archtool.table.dataset:         # Табличный документ на оcновании источника данных
    type: table
    headers:
      - value: location
        text: Документ
        sortable: true
        align: left
        width: 100%
        link: link
    source: archtool.docs           # Идентификтор источника данных
  archtool.table.dataset.post:    # Табличный с портобработкой данных источника
    type: table
    headers:
      - value: title
        text: Документ
        sortable: true
        align: left
        width: 100%
        link: link
    origin: archtool.docs         # Оригинальный источник данных
    source: >                     # Отбирает документы концепции
      (
        $[$substring(location, 0, 36) = "SEAF.ArchTool/Руководство/Документы/"].{
          "title": $substring(location, 36),
          "link": link
        }
      )
  archtool.dataset.preset:        # Табличный документ на оcновании предопределенного источника данных
    type: table
    headers:
      - value: title
        text: Класс критичности
        sortable: true
        align: left
        width: 100%
    source: archtool.components.criticality
  archtool.dataset.li:           # Табличный документ на оcновании предопределенного источника данных
    type: table
    headers:
      - value: location
        text: Компонент L1
        sortable: true
        align: left
        width: 100%
        link: link
    source: archtool.components.l1
  archtool.table.integrations:          # Базовое описание таблицы интеграций
    type: table
    headers:
      - value: from
        text: Система 1
        sortable: true
        align: left
        width: 20%
        link: link-from       
      - value: to
        text: Система 2
        sortable: true
        align: left
        width: 20%
        link: link-to
      - value: direction
        text: Связь
        sortable: true
        align: center
        width: 5%
      - value: title
        text: Описание
        sortable: true
        align: left
      - value: contract
        text: Контракт
        sortable: true
        align: left
        link: link-contract
  archtool.table.integrations.vuex:     # Отбирает только компоненты VUEX
    $prototype: archtool.table.select   # Родительская таблицы
    origin: archtool.integrations       # Базовый источник данных
    source: >
        (
            $[from="VUEX" or to="VUEX"]
        )
  archtool.table.multi_dependencies:        # Табличный документ на основании источника данных с множественными зависимостями
    type: table
    headers:
      - value: from
        text: Система 1
        sortable: true
        align: left
        width: 20%
        link: link-from
      - value: to
        text: Система 2
        sortable: true
        align: left
        width: 20%
        link: link-to
      - value: direction
        text: Связь
        sortable: true
        align: center
        width: 5%
      - value: title
        text: Описание
        sortable: true
        align: left
      - value: criticality
        text: Критичность связи
        sortable: true
        align: left
    source: archtool.multi_dependencies
datasets:                       # Источники данных
  # **********************************************
  #     Источник с предопределенными данными
  # **********************************************
  archtool.components.criticality:    # Определяет уровни критичности
    source:                         # Предопределенные данные
      - id: k1
        title: Уровень K1
      - id: k2
        title: Уровень K2
      - id: k3
        title: Уровень K3
      - id: k4
        title: Уровень K4

  # **********************************************
  #   Источники с запросами к данным архитектуры
  # **********************************************

  # Возвращает список всех документов
  archtool.docs:
    source: >                     # Выводит все документы
      (
        [docs.$spread().{
          "location": *.location,
          "link": "/docs/" & $keys()[0]
        }[location]^(location)]
      )

  # Возвращает все архитектурные компоненты SEAF.ArchTool
  archtool.components:
    source: >                     # JSONata запрос к архитектуре
      (
        [components.$spread().{
            "id": $keys()[0],
            "location": *.title,
            "link": "/architect/components/" & $keys()[0]
        }[$substring(id, 0, 9)="archtool."]^(title)]
      )

  # **********************************************
  # Источники с зависимостями от других источников
  # **********************************************

  # Выбирает только L1 для архитектурных компонентов SEAF.ArchTool
  archtool.components.l1:
    origin: archtool.components     # Базовый источник данных
    source: >                     # JSONata запрос к архитектуре
      ($[$count($split(id, "."))=2])

  # Базовый источник данных интеграций
  archtool.integrations:
    source: >                     # JSONata запрос к архитектуре
      (
        $MANIFEST := $;
        $distinct([components.$spread().(
            $COMPONENT := $;
            $COMPONENT_ID := $keys()[0];
            $.*.links.{
                "from": $COMPONENT.*.title,
                "link-from": "/architect/components/" & $COMPONENT_ID,
                "to": id ? $lookup($MANIFEST.components, id).title : id,
                "link-to": "/architect/components/" & id,
                "contract": contract ? $lookup($MANIFEST.docs, contract).location : contract,
                "link-contract": "/docs/" & contract,
                "title": title,
                "direction": direction
            };
        )])^(from)
      )

  # **********************************************
  # Источники с множественными зависимостями
  # **********************************************
  archtool.multi_dependencies:
    origin:
      integrations: archtool.integrations             # Указываем зависимость от источника "archtool.integrations"
      criticality: archtool.components.criticality    # Указываем зависимость от источника "archtool.components.criticality"
      manifest: "($)"                               # Указывается зависимость от результата запроса JSONata - "($)"
    source: >
      (
        /* Сохраняем контекст для использования в глубине */
        $CONTEXT := $;

        /* Обрабатываем данные подготовленные источником "archtool.integrations" */
        integrations.(
            /* Восстанавливаем ID компонента, чтобы получить по нему данные */
            $ID_FROM := $reverse($split($."link-from", "/"))[0];
            $ID_TO := $reverse($split($."link-to", "/"))[0];

            /* Получаем данные критичности */
            $CRITICALLY_FROM := $lookup($CONTEXT.manifest.components, $ID_FROM).criticality;
            $CRITICALLY_FROM := $CRITICALLY_FROM ? $CRITICALLY_FROM : 4;
            $CRITICALLY_TO := $lookup($CONTEXT.manifest.components,$ID_TO).criticality;
            $CRITICALLY_TO := $CRITICALLY_TO ? $CRITICALLY_TO : 4;
            $CRITICALLY := $CRITICALLY_FROM < $CRITICALLY_TO ? $CRITICALLY_FROM : $CRITICALLY_TO;

            /* Обогащаем данные DataSet "archtool.integrations" информацией о критичности связи */
            $merge([$, {
                "criticality": $CONTEXT.criticality[id="k" & $CRITICALLY].title
            }])
        );
      )

