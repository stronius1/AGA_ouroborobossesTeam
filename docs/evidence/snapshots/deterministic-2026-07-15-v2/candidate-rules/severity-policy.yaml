# Политика severity и вердикта AGA.
# Изменение этого файла = minor/major bump версии skill (см. evolver/mutations.md).
schema: aga.severity-policy/v1

severities: [blocker, major, minor]

# Агрегация: вердикт определяется максимальной severity среди findings.
aggregation: max_severity

verdict_policy:
  has_blocker: request_changes_escalate     # request changes + эскалация архитектору
  has_major: request_changes_escalate
  minor_only: approve_with_warnings          # авто-проход с комментарием
  none: approve                              # чистый авто-апрув

confidence:
  min_for_blocker: 0.70   # ниже — finding понижается до major + low_confidence
  min_for_finding: 0.40   # ниже — публикуется как observation без severity

autonomy:
  auto_merge: false                          # жёсткий инвариант, не эволюционирует
  auto_verdicts: [approve, approve_with_warnings]
  human_required_for: [request_changes_escalate]

escalation:
  assignee: architect_on_duty
  note: "SLA-подсказка для демо: 15 минут на эскалированный PR"

# Веса ошибок — используются fitness-гейтом эволюции (evolver/fitness.py).
# Смысл: пропущенный blocker на порядок дороже ложного minor.
error_costs:
  missed_blocker: 10.0
  missed_major: 5.0
  missed_minor: 1.0
  false_blocker: 3.0
  false_major: 2.0
  false_minor: 0.5
