docs:
  archtool.plugins.editable-table.base.table:
    origin:
      # Может быть использовано любое JSONata выражение для получения данных из архитектурного озера
      body: >
        ({
          "row_1": {
            "ID": "001",
            "name": "Иванов Иван Иванович",
            "age": 23,
            "ice_cream": "vanilla",
            "subscription": true,
            "color": ["blue", "white"],
            "pet": "dog",
            "breed": ["pug", "mastiff"],
            "link": {
              "href": "/",
              "text": "Home"
            }
          },
          "row_2": {
            "ID": "002",
            "name": "Семенов Семен Семенович",
            "age": 17,
            "subscription": false,
            "color": ["red"],
            "pet": "cat",
            "breed": ["maine_coon"],
            "link": [
              {
                "href": "https://www.google.ru/",
                "text": "Google"
              },
              "просто текст",
              {
                "href": "url",
                "text": "Невалидный URL"
              },
              {
                "href": "https://ya.ru/",
                "text": "Яндекс"
              }
            ]
          },
          "row_3": {
            "ID": "003",
            "name": "Петров Петр Петрович",
            "age": 73,
            "ice_cream": "chocolate",
            "subscription": true
          },
          "row_4": {
            "ID": "004",
            "name": "Александров Александр Александрович",
            "age": 29,
            "color": ["green"],
            "link": "https://www.google.ru/",
            "pet": "cat",
            "breed": ["maine_coon", "siamese", "siberian"]
          }
        })

      color_options: >
        ([
          {"value": "red", "text": "Красный"},
          {"value": "green", "text": "Зеленый"},
          {"value": "blue", "text": "Синий"},
          {"value": "white", "text": "Белый"}
        ])

      age_groups: >
        ([
            { "start": 0, "end": 12, "group_name": "Ребенок" },
            { "start": 13, "end": 17, "group_name": "Подросток" },
            { "start": 18, "end": 64, "group_name": "Взрослый" },
            { "start": 65, "group_name": "Пожилой" }
        ])
    type: editable-table
    # type - Тип документа
    page_size: 5
    # page_size - Количество строк на странице
    # Дефолтное значение: 20
    # Допустимые значения: положительные целые числа
    selection: false
    # selection - Отображение чекбоксов для выбора строк
    # Дефолтное значение:  false
    # Допустимые значения: false / true
    filtration: false
    # filtration - Флаг позволяющий глобально отключить отображение фильтров в каждой колонке
    # Дефолтное значение: true
    # Допустимые значения: true / false
    direction: ltr
    # direction - Направление таблицы
    # Дефолтное значение:  ltr
    # Допустимые значения: ltr (left to right) / ttb (top to bottom)
    excel_export: false
    # excel_export - Флаг позволяющий отключить выгрузку таблицы в excel
    # Дефолтное значение:  true
    # Допустимые значения: true / false
    excel_export_filter: false
    # excel_export_filter - Флаг позволяющий применить используемые фильтры и сортировку при выгрузке excel
    # Дефолтное значение:  false
    # Допустимые значения: true / false
    new_row_allowed: true
    # new_row_allowed - Флаг позволяющий отключить создание новой строки
    # Дефолтное значение:  true
    # Допустимые значения: true / false
    row_remove_allowed: true
    # row_remove_allowed - Флаг позволяющий отключить удаление строк
    # Важно: требует установки значения `selection: true`
    # Дефолтное значение:  true
    # Допустимые значения: true / false
    show_data_error: false
    # show_data_error - Флаг позволяющий отобразить таблицу содержащую ошибки в данных (body)
    # Дефолтное значение:  false
    # Допустимые значения: true / false
    update_index_file: null
    # update_index_file - Позволяет обновить индексные файлы при сохранении.
    # При отсуствии значения - индексные файлы не обновляются.
    # В качестве значения "update_index_file" необходимо указать наименование индексного файла, например - "root.yaml".
    # Не затрагивает уже подключенные файлы.
    new_row: >
      (
          $rows := $keys(table);
          $new_row_count := $count($rows) + 1;
          $new_row_id := "row_" & $new_row_count;
          $new_row_id
      )
    # new_row - JSONata выражение
    # Позволяет автоматически формировать идентификатор строки при ее создании
    # Если значение не указано, будет выведено окно для ввода
    # Если строка с таким идентификатором уже существует - строка не будет создана, будет выведено уведомление в лог
    # Данные из таблицы доступны как параметр (origin) "table" (зарезервированное имя)

    # Параметры для текущего примера:
    #   $ = {
    #         table: {...},              # Зарезервированное имя (origin), содержит слайс данных из таблицы (колонки сохраняемые по одному пути)
    #         body: {...},               # origin: body
    #         color_options: {...},      # origin: color_options
    #         age_groups: {...}          # origin: age_groups
    #       }

    format: >
      (
         table ~> | * | {"price": $number(**.price) * 2} |
      )
    # format - JSONata выражение
    # Позволяет преобразовать данные перед сохранением
    # Перед сохранением данных осуществляется загрузка данных по указанному пути.
    # Данные из файла доступны как параметр (origin) "file" (зарезервированное имя)
    # Данные из таблицы доступны как параметр (origin) "table" (зарезервированное имя)

    # Параметры для текущего примера:
    #   $ = {
    #         table: {...},              # Зарезервированное имя (origin), содержит слайс данных из таблицы (колонки сохраняемые по одному пути)
    #         full_table: {...},         # Зарезервированное имя (origin), содержит данные из таблицы
    #         file: {...},               # Зарезервированное имя (origin), содержит данные из файла, в который производится запись
    #         body: {...},               # origin: body
    #         color_options: {...},      # origin: color_options
    #         age_groups: {...}          # origin: age_groups
    #       }

    yaml:
      # yaml - позволяет настроить форматирование yaml при сохранении
      null_replace_string: null
      # null_replace_string - позволяет заменить пустые значения при сохранении
      # Дефолтное значение: "" (пустая строка)

    headers:
      # headers - Массив заголовков
      # Обязательное
      - value: ID
        # value - Идентификатор поля для вывода в колонке
        # Обязательное
        width: 50px
        # width - Ширина колонки (px)
        # Обязательное значение при указании "pinned: true"
        filterable: false
        # filterable - Флаг, позволяет отключить фильтрацию в колонке
        # Дефолтное значение: true
        # Допустимые значения: true / false
        sortable: false
        # sortable - Флаг позволяет запретить сортировку по колонке
        # Дефолтное значение: true
        # Допустимые значения: true / false
        type: text
        # type - Тип вывода ячеек для указанной колонки
        # Дефолтное значение:  text
        # Допустимые значения: text / select / multiple-select / checkbox / link / fn
        display: true
        # display - Флаг позволяет скрыть колонку в интерфейсе
        # Дефолтное значение: true
        # Допустимые значения: true / false
        # Колонки не доступны в интерфейсе, но прочий функционал для скрытой ячейки сохраняется.
        # Т.о. мы можем сохранять скрытые ячейки, использовать ячейки в заголовках `fn`, форматировании и пр.

      - value: name
        text: Имя
        # text - Отображаемый заголовок
        # Дефолтное значение: подставляется из значения value
        pinned: true
        # pinned - Позволяет закрепить колонку при горизонтальном скроле
        # Дефолтное значение:  false
        # Допустимые значения: true / false
        # При "pinned: true" необходимо явно установить значение для "width"
        width: 250px
        style:
          # style - Позволяет установить css-inline стили для колонки
          # Допустимые значения: допустимые css-inline в camelCase нотации
          fontWeight: 800 # Пример (насыщенность шрифта)
          fontStyle: italic # Пример (стиль шрифта)
        styles:
          # styles - Позволяет указать как дефолтные, так и css-inline стили применяемые по условию (conditions).
          # Важно: Перечисляется в порядке увеличения приоритета (при установке одинаковых стилей, первое будет перетерто последующим)
          gray-background-for-ivan-and-petr:
            # Наименование группы css-правил (любой текст в качестве имени)
            backgroundColor: gray # Пример css-inline (цвет фона)
            conditions:
              # conditions - условия для применения стиля (массив)
              # При отсутствии условия группа css-правил применяется по дефолту
              - condition_type: equal
                # condition_type - Тип условия
                # Допустимые значения:
                # equal - сравнение
                # includes - проверка наличия подстроки
                # match - регулярное выражения
                # '>'   - Больше (Обязательно в кавычках)
                # '>='  - Больше или равно (Обязательно в кавычках)
                # '<'   - Меньше (Обязательно в кавычках)
                # '<='  - Меньше или равно (Обязательно в кавычках)
                value: Петров Петр Петрович
                # value - Значение условия (текст, число, regExp)
              - condition_type: includes
                value: Иванович

      - value: age
        text: Возраст
        width: 100px
        styles:
          adult:
            backgroundColor: blue
            color: white
          old:
            backgroundColor: green
            conditions:
              - condition_type: ">"
                value: 70
          child:
            backgroundColor: orange
            conditions:
              - condition_type: "<"
                value: 18

      - value: is_adult
        text: Возрастная группа
        width: 150px
        type: fn
        # type: fn позволяет вывести произвольные данные
        # рассчитанные JSONata-выражением, на основе прочих данных в строке
        fn: >
          (
              $age := $number(row.age);
          
              $reduce_cb := function($acc, $group){(
                $acc = null
                ? $age > $group.end
                  ? null
                  : $group."group_name"
                : $acc
              )};
          
              row.age 
                  ? $reduce(age_groups, $reduce_cb, null)
                  : "Возраст не указан"
          )
        # fn - JSONata выражение
        # Результат выражения отражается в ячейке
        # Если при вычислении JSONata выражения произойдет ошибка, в ячейке будет выведено "Ошибка"
        # Данные из строки доступны как параметр (origin) "row" (зарезервированное имя)

        # Параметры для текущего примера:
        #   $ = {
        #         row: {...},                # Зарезервированное имя (origin), содержит данные из строки
        #         body: {...},               # origin: body
        #         color_options: {...},      # origin: color_options
        #         age_groups: {...}          # origin: age_groups
        #       }

      - value: subscription
        text: Подписка
        width: 80px
        type: checkbox

      - value: ice_cream
        text: Мороженное
        width: 100px
        type: select
        options:
          # options - опции для типа "select" и "multiple-select"
          # Обязательное для "select" и "multiple-select"
          # Допустимые значения:
          # 1. массив объектов, с обязательным полем `value` (идентификатор) и опциональным `text` (значение отражаемое в таблице)
          # 2. объект, где ключ - идентификатор для выпадающего списка, значение - массив объектов, с обязательным полем `value` (идентификатор) и опциональным `text` (значение отражаемое в таблице)
          # также значением может быть JSONata выражение (или origin), выполнение которого вернет аналогичную структуру
          - value: vanilla
            text: ванильное
          - value: chocolate
            text: шоколадное
        styles:
          chocolate:
            backgroundColor: chocolate
            conditions:
              - condition_type: equal
                value: chocolate
          vanilla:
            backgroundColor: pink
            conditions:
              - condition_type: equal
                value: vanilla

      - value: color
        text: Цвет
        width: 130px
        type: multiple-select
        options: >
          (color_options)

      # Выпадающий список по условию (колонки pet и breed)
      - value: pet
        text: Питомец
        width: 150px
        type: select
        options:
          - value: cat
            text: Кошка
          - value: dog
            text: Собака

      - value: breed
        text: Порода
        width: 150px
        type: multiple-select
        option_id: pet
        # option_id - позволяет настроить опциональные значения в выпадающем списке
        # Допустимое значение: идентификатор (ключ) одной из опций и, одновременно, идентификатор (value) одного из заголовков (headers)
        # В зависимости от значения в колонке "pet" использует одну из групп опций
        # Обязательное, когда options задан объектом
        options:
          cat:
            # Опция применяется если значение из колонки "pet" для текущей строки равно "cat"
            - value: siamese
              text: сиамская
            - value: siberian
              text: сибирская
            - value: maine_coon
              text: мейн-кун
          dog:
            # Опция применяется если значение из колонки "pet" для текущей строки равно "dog"
            - value: mastiff
              text: мастиф
            - value: dalmatian
              text: далматинец
            - value: pug
              text: мопс

      - value: link
        width: 150px
        text: Ссылки
        type: link
        # Допустимые значения для ссылок:
        # 1. Текст:
        #   https://www.google.ru/
        # 2. Объект:
        #   {
        #     "href": "/architect/components/system.auth",
        #     "text": "Авторизация"
        #   }
        # 3. Массив объектов:
        #   [
        #       {
        #           "href": "https://www.google.ru/",
        #           "text": "google"
        #       },
        #       {
        #           "href": "/docs/example",
        #           "text": "Пример документа"
        #       }
        #   ]

    # Результатом выполнения выражения в source ожидается объект с обязательным полем body и опциональным headers
    # См. origin/body
    source: >
      (
        { "body": body }
      )

