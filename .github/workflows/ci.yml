name: local-contracts

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: recursive
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
          cache: pip
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: seaf-archtool-core/package-lock.json
      - name: Verify dependency pins before repository install scripts
        run: make verify-pins
      - name: Install hash-locked Python dependencies
        run: python -m pip install --require-hashes -r aga-skill/requirements-ci.txt
      - name: Install ArchTool dependencies from npm lock
        run: npm ci
        working-directory: seaf-archtool-core
      - name: Python tests
        run: make test
      - name: Development-v2 offline contracts
        run: make verify-development-v2
      - name: SEAF and MCP contracts
        run: make test-seaf
      - name: Offline E2E
        run: make demo-offline
      - name: Project-owned secret scan
        run: make check-secrets
      - name: Remove generated interpreter/test caches
        run: make clean-caches
      - name: Submission hygiene
        run: make project-results-check
      - name: Tree remains clean
        run: test -z "$(git status --short)"
