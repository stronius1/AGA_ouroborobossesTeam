docs:
  archtool.plugins.editable-table.styles.examples.base_example.table.step_1:
    type: editable-table
    origin:
      body: >
        ($."archtool.plugins.editable-table.styles.examples.base_example.data")
    headers:
      - value: name
      - value: gender
        type: select
        options:
          - value: male
            text: муж
          - value: female
            text: жен
      - value: age
      - value: colors
        type: multiple-select
        options:
          - value: blue
            text: Синий
          - value: green
            text: Зеленый
          - value: red
            text: Красный
          - value: teal
            text: Бирюзовый
          - value: orange
            text: Оранжевый
          - value: yellow
            text: Желтый
    source: >
      (
          { "body": body }
      )

  archtool.plugins.editable-table.styles.examples.base_example.table.step_2:
    type: editable-table
    origin:
      body: >
        ($."archtool.plugins.editable-table.styles.examples.base_example.data")
    headers:
      - value: name
        styles:
          bold-font-for-ivan:
            fontWeight: bold
            conditions:
              - condition_type: includes
                value: Иван

      - value: gender
        type: select
        options:
          - value: male
            text: муж
          - value: female
            text: жен
      - value: age
        styles:
          default:
            backgroundColor: blue
            color: white
          less-then-60:
            backgroundColor: green
            conditions:
              - condition_type: "<"
                value: 60
          less-then-18:
            backgroundColor: yellow
            conditions:
              - condition_type: "<"
                value: 18
      - value: colors
        type: multiple-select
        options:
          - value: blue
            text: Синий
          - value: green
            text: Зеленый
          - value: red
            text: Красный
          - value: teal
            text: Бирюзовый
          - value: orange
            text: Оранжевый
          - value: yellow
            text: Желтый
        styles:
          blue:
            backgroundColor: blue
            conditions:
              - condition_type: equal
                value: blue
          green:
            backgroundColor: green
            conditions:
              - condition_type: equal
                value: green
          red:
            backgroundColor: red
            conditions:
              - condition_type: equal
                value: red
          teal:
            backgroundColor: teal
            conditions:
              - condition_type: equal
                value: teal
          orange:
            backgroundColor: orange
            conditions:
              - condition_type: equal
                value: orange
          yellow:
            backgroundColor: yellow
            conditions:
              - condition_type: equal
                value: yellow
    source: >
      (
          { "body": body }
      )
