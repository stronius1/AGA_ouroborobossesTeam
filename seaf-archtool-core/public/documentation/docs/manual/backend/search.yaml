openapi: 3.0.0
info:
  title: Search Service API
  version: 1.0.0
  description: |
    API трёхшагового поиска объектов в хранилище архитектуры SEAF.ArchTool.
    Поиск состоит из: (1) выбор сущности, (2) получение полей для фильтрации, (3) выполнение поиска с фильтрами.
    
    Реализация (backend, frontend, конфигурация): см. документ «Реализация поиска».
    
    ## Особенности
    * Все фильтры объединяются по логике **AND** (объект должен удовлетворять всем условиям)
    * Поддержка различных типов данных (строки, числа, булевы значения, массивы)
    * Поддержка полей-ссылок (rel) — фильтрация по названиям связанных сущностей
    * Возможность отрицания условий через флаг `not`
    * Регистронезависимый поиск для строковых операций

servers:
  - url: http://localhost:3030
    description: Локальный сервер SEAF.ArchTool
  - url: https://{URL}
    description: Production
    variables:
      URL:
        default: localhost:3030

paths:
  /seaf-core/api/core/storage/search/searchable-entities:
    get:
      summary: Получить список доступных сущностей для поиска
      description: |
        Первый шаг поиска. Возвращает список сущностей, по которым можно выполнять поиск,
        и признак наличия организаций (companies) в манифесте.
        Для сущностей с данными в датасете в ответе присутствует поле `dataset`.
      operationId: searchFirst
      tags:
        - Search
      responses:
        '200':
          description: Список сущностей и метаданные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FirstResponse'
              examples:
                default:
                  summary: Стандартный ответ
                  value:
                    entities:
                      - key: __all__
                        title: Все
                      - key: kadzo.v2023.groups.groups
                        title: Группы
                      - key: kadzo.v2023.application.systems
                        title: Системы
                        dataset: kadzo.v2023.application.systems
                    hasCompanies: true
        '503':
          description: Сервис не готов (хранилище не инициализировано)

  /seaf-core/api/core/storage/search/entity-filters:
    get:
      summary: Получить поля для фильтрации выбранной сущности
      description: |
        Второй шаг поиска. Для выбранной сущности возвращает список полей (атрибутов),
        по которым можно строить фильтры: строковые, числовые, enum и поля-ссылки (rel).
        При choice=__all__ возвращается пустой массив.
      operationId: searchSecond
      tags:
        - Search
      parameters:
        - name: choice
          in: query
          required: true
          description: Идентификатор сущности (key из ответа /first) или __all__
          schema:
            type: string
          example: kadzo.v2023.application.systems
      responses:
        '200':
          description: Список полей для фильтрации
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FilterField'
              examples:
                entityFields:
                  summary: Поля сущности
                  value:
                    - key: title
                      title: Название
                      type: string
                    - key: description
                      title: Описание
                      type: string
                    - key: status
                      title: Статус
                      type: enum
                      enumValues: [active, draft, archived]
                    - key: owner
                      title: Владелец
                      type: rel
                      relTarget: kadzo.v2023.groups.groups
                      isArray: false
                allEmpty:
                  summary: При choice=__all__
                  value: []
        '400':
          description: Отсутствует choice или у сущности нет схемы
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchError'
        '503':
          description: Сервис не готов

  /seaf-core/api/core/storage/search/rel-suggestions:
    get:
      summary: Подсказки для полей-ссылок (autocomplete)
      description: |
        Возвращает варианты подстановки для полей типа rel при вводе в фильтр.
        Ищет по title и aliases связанных объектов. Лимит 50 результатов.
        Данные целевой сущности загружаются из озера или из датасета,
        если для rel-target сущности задан `dataset` в `search.entities`.
      operationId: relSuggestions
      tags:
        - Search
      parameters:
        - name: relTarget
          in: query
          required: true
          description: Целевая сущность ссылки (entityId.subjectId, напр. kadzo.v2023.groups.groups)
          schema:
            type: string
          example: kadzo.v2023.groups.groups
        - name: query
          in: query
          required: false
          description: Подстрока для поиска (регистронезависимый)
          schema:
            type: string
          example: админ
      responses:
        '200':
          description: Массив подсказок
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    text:
                      type: string
                      description: Отображаемое название
                    value:
                      type: string
                      description: Значение для подстановки
              example:
                - text: Администраторы
                  value: Администраторы
                - text: Админ-группа
                  value: Админ-группа
        '400':
          description: Отсутствует relTarget
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchError'
        '503':
          description: Сервис не готов

  /seaf-core/api/core/storage/search/search-run:
    post:
      summary: Выполнить поиск по фильтрам
      description: |
        Третий шаг поиска. Выполняет поиск объектов выбранной сущности с применением фильтров.
        При choice=__all__ поддерживается полнотекстовый поиск по searchQuery (слова ищутся в title и description).
        Лимит результатов — 10 000.
        Данные сущности и rel-target сущностей загружаются из озера или датасета по конфигу `search.entities`.
      operationId: searchThird
      tags:
        - Search
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchRequest'
            examples:
              basicSearch:
                summary: Простой поиск по одной сущности
                value:
                  choice: "kadzo.v2023.application.systems"
                  filters:
                    - field: title
                      operator: contains
                      value: МИС
                      ignoreCase: true
              complexSearch:
                summary: Сложный поиск с несколькими условиями
                value:
                  choice: "kadzo.v2023.application.systems"
                  filters:
                    - field: title
                      operator: contains
                      value: Система
                      ignoreCase: true
                    - field: status
                      operator: eq
                      value: active
                    - field: owner
                      operator: contains
                      value: Администраторы
              searchAll:
                summary: Поиск по всем сущностям (choice=__all__)
                value:
                  choice: __all__
                  filters: []
                  searchQuery: МИС интеграция
      responses:
        '200':
          description: Массив найденных объектов
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResultArray'
              examples:
                systemsFound:
                  summary: Найденные системы
                  value:
                    - _sfa_key: kadzo.v2023.sys.emis
                      _sfa_entity: kadzo.v2023.application.systems
                      company: Kadzo
                      entityTitle: Системы
                      title: МИС ЭМИС
                      description: Медицинская информационная система
                      card: /entities/kadzo.v2023.application.systems/card?id=kadzo.v2023.sys.emis
        '400':
          description: Ошибка в запросе (отсутствует body/choice/filters, сущность не найдена или без схемы)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchError'
              examples:
                missingChoice:
                  value:
                    error: 'request body must contains string attr "choice"'
                missingFilters:
                  value:
                    error: 'request body must contains array attr "filters"'
                entityNotFound:
                  value:
                    error: 'chosen entity not found'
        '503':
          description: Сервис не готов

components:
  schemas:
    SearchRequest:
      type: object
      required:
        - choice
        - filters
      properties:
        choice:
          type: string
          description: |
            Идентификатор сущности (key из /first). 
            Спец. значение __all__ — поиск по всем сущностям (используется searchQuery).
          example: "kadzo.v2023.application.systems"
        filters:
          type: array
          description: |
            Массив фильтров. Все фильтры объединяются по логике AND.
            Для choice=__all__ может быть пустым.
          items:
            $ref: '#/components/schemas/Filter'
        searchQuery:
          type: string
          description: |
            Текстовый запрос для choice=__all__. Слова ищутся в title и description.
            Не используется при выборе конкретной сущности.
          example: "МИС интеграция"

    Filter:
      type: object
      description: |
        Примеры:
        ---
        Базовые фильтры:
          - {"field": "age", "operator": "eq", "value": 25}
          - {"field": "price", "operator": "gt", "value": 100}
          - {"field": "count", "operator": "lte", "value": 50}
        ---  
        Строковые фильтры:
          - {"field": "name", "operator": "contains", "value": "john", "ignoreCase": true}
          - {"field": "email", "operator": "startsWith", "value": "admin"}
          - {"field": "code", "operator": "endsWith", "value": "XYZ", "not": true}
        ---  
        Фильтры для массивов:
          - {"field": "tags", "operator": "contains", "value": "important"}
          - {"field": "status", "operator": "in", "value": ["active", "pending"]}
        ---  
        Диапазонные фильтры:
          - {"field": "price", "operator": "between", "value": [10, 100]}
          - {"field": "date", "operator": "gt", "value": "2023-01-01"}
        ---  
        Фильтры с отрицанием:
          - {"field": "status", "operator": "eq", "value": "deleted", "not": true}
          - {"field": "tags", "operator": "contains", "value": "spam", "not": true}
      required:
        - field
        - operator
      properties:
        field:
          type: string
          description: Имя поля (атрибута) объекта, по которому применяется фильтр
          example: "age"

        operator:
          type: string
          description: |
            Оператор сравнения. Доступные значения:
            
            **Базовые операторы:**
            * `eq` - равно (==)
            * `gt` - больше (>)
            * `gte` - больше или равно (>=)
            * `lt` - меньше (<)
            * `lte` - меньше или равно (<=)
            
            **Строковые операторы:**
            * `contains` - содержит подстроку (для строк) или элемент (для массивов)
            * `startsWith` - начинается с подстроки
            * `endsWith` - заканчивается подстрокой
            
            **Операторы для множеств:**
            * `in` - значение находится в списке допустимых значений
            * `between` - значение находится в диапазоне [min, max] (для чисел)
            
            **Специальные операторы:**
            * `exists` - поле существует (не равно null/undefined)
            
            ### Совместимость операторов с типами данных:
            | Оператор | string | number | boolean | array | object |
            |----------|--------|---------|---------|--------|--------|
            | eq | ✅ | ✅ | ✅ | ✅ | ✅ |
            | gt | ⚠️* | ✅ | ❌ | ❌ | ❌ |
            | gte | ⚠️* | ✅ | ❌ | ❌ | ❌ |
            | lt | ⚠️* | ✅ | ❌ | ❌ | ❌ |
            | lte | ⚠️* | ✅ | ❌ | ❌ | ❌ |
            | contains | ✅ | ⚠️** | ❌ | ✅ | ❌ |
            | startsWith | ✅ | ❌ | ❌ | ❌ | ❌ |
            | endsWith | ✅ | ❌ | ❌ | ❌ | ❌ |
            | in | ✅ | ✅ | ✅ | ✅ | ✅ |
            | between | ❌ | ✅ | ❌ | ❌ | ❌ |
            | exists | ✅ | ✅ | ✅ | ✅ | ✅ |
            
            *⚠️* - для строк числовые операторы сравнивают лексикографически (по алфавиту)
            **⚠️** - для чисел contains работает через преобразование в строку
          enum:
            - eq
            - gt
            - gte
            - lt
            - lte
            - contains
            - startsWith
            - endsWith
            - in
            - between
            - exists
          example: "gte"

        value:
          description: |
            Значение для сравнения. Для exists можно не передавать.
            * eq, gt, gte, lt, lte, contains, startsWith, endsWith — string | number | boolean
            * in — массив допустимых значений
            * between — массив [min, max]
          oneOf:
            - type: string
            - type: number
            - type: boolean
            - type: array
              items: {}
          example: 30

        not:
          type: boolean
          description: |
            Флаг отрицания. Если `true`, условие инвертируется.
            Например: `{"field": "status", "operator": "eq", "value": "deleted", "not": true}` 
            означает "статус НЕ равен deleted"
          default: false
          example: false

        ignoreCase:
          type: boolean
          description: |
            Флаг регистронезависимости для строковых операций.
            Применяется только для операторов: `eq`, `contains`, `startsWith`, `endsWith`, `in`
            Для остальных операторов игнорируется.
          default: false
          example: true

    SearchResultArray:
      type: array
      description: Массив найденных объектов (лимит 10 000)
      items:
        $ref: '#/components/schemas/SearchResultItem'

    SearchResultItem:
      type: object
      description: Элемент результата поиска
      properties:
        _sfa_key:
          type: string
          description: Уникальный ключ объекта
        _sfa_entity:
          type: string
          description: Идентификатор сущности
        company:
          type: string
          description: Название организации (если есть)
        entityTitle:
          type: string
          description: Название типа сущности
        title:
          type: string
          description: Заголовок объекта
        description:
          type: string
          description: Описание
        card:
          type: string
          description: URL карточки сущности (если есть presentation)
      additionalProperties: true

    FilterField:
      type: object
      description: Поле для построения фильтра (из /second)
      properties:
        key:
          type: string
        title:
          type: string
        type:
          type: string
          enum: [string, number, integer, enum, rel]
        enumValues:
          type: array
          items:
            type: string
          description: Для type=enum
        relTarget:
          type: string
          description: Для type=rel (entityId.subjectId)
        isArray:
          type: boolean
          description: Для type=rel

    FirstResponse:
      type: object
      properties:
        entities:
          type: array
          items:
            type: object
            properties:
              key:
                type: string
                example: __all__
              title:
                type: string
                example: Все
              dataset:
                type: string
                description: Идентификатор датасета (если данные сущности в датасете, а не в озере)
                example: kadzo.v2023.application.systems
        hasCompanies:
          type: boolean
          description: Есть ли организации в манифесте

    SearchError:
      type: object
      properties:
        error:
          type: string
          description: Сообщение об ошибке
      example:
        error: 'query param "choice" required'
