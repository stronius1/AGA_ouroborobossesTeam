# -----------------------------------------------------------------
# [ПРИМЕР] Использование seaf-archtool-core в docker-compose проекте
# -----------------------------------------------------------------
services:
  seaf-archtool-core:
    # -----------------------------------------------------------------
    # [ПРИМЕР] Подключаем заготовленный template.yaml с готовой конфигурацией.
    # -----------------------------------------------------------------
    extends:
      file: ./.template.yaml
      service: seaf-archtool-core
    
    # -----------------------------------------------------------------
    # [ПРИМЕР] Переопределение дефолтного образа из .template.yaml.
    # -----------------------------------------------------------------
    # Раскомментируйте и укажите свой тег, если используете конкретную версию:
    # image: gitverse.ru/seafteam/seaf-archtool-core:2026.29.0-dev-test.2

    # -----------------------------------------------------------------
    # [ПРИМЕР] Локальная сборка из исходников
    # -----------------------------------------------------------------
    # Чтобы включилась локальная сборка, достаточно передать пустую строку в поле image
    # image: ""

    # -----------------------------------------------------------------
    # [ПРИМЕР] Локальная сборка со своим Dockerfile
    # -----------------------------------------------------------------
    # Если требуется указать конкретный Dockerfile и/или доп. опции, то можете 
    # переопределить весь блок build:
    # build:
    #   context: ../../
    #   dockerfile: path/to/Dockerfile
    #   additional_contexts:
    #     <name>: <path>
    #     ...
    #   ...

    # -----------------------------------------------------------------
    # [ПРИМЕР] Аналогично можно переопределить/доопределить другие поля
    # -----------------------------------------------------------------
    # container_name: <name>
    # hostname: <name>
    # env_file:
    #   - path: ../../custom.env
    #     required: false
    # environment:
    #   VUE_APP_DOCHUB_JSONATA_ANALYZER: n
    #   ...
    # ...
  
  # -----------------------------------------------------------------
  # [ПРИМЕР] Здесь, например, описание остаьных сервисов.
  # -----------------------------------------------------------------
  # seaf-plantuml-server:
  #   ...
  #
  # my-other-service:
  #   ...
