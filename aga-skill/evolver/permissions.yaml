# Runtime contracts for the candidate-only evolver and the separately invoked
# local VCS connector. Neither role has a network, push, approve, or merge path.
schema: aga.permissions/v1
role: aga-evolver

allow:
  read: [rules/, precedents/, golden/, logs/, fixtures/, templates/]
  write: [build/, logs/evolution.jsonl]
  actions: [run_fitness, dry_run_publish]

deny:
  actions:
    - create_candidate_branch
    - create_candidate_commit
    - merge
    - approve_pr
    - push
    - push_to_main
    - modify_architecture_repo
    - open_pull_request
  write:
    - rules/
    - VERSION
    - CHANGELOG.md
    - SKILL.md
    - SKILL.md#section-0
    - evolver/fitness.py
    - evolver/permissions.yaml
    - evolver/mutations.py
    - evolver/policy.py
    - golden/corpus.yaml
    - golden/corpus.yaml#expected
    - golden/corpus.lock.json
    - golden/prs/
    - fixtures/
    - scripts/

validation_only:
  command: scripts/apply_candidate.py
  effects: [rebuild_candidate, recompute_fitness, recompute_gate]
  source_writes: false
  apply_supported: false

local_vcs_connector:
  role: aga-local-candidate-publisher
  command: scripts/publish_candidate.py
  network: false
  allow:
    actions:
      - validate_candidate
      - recompute_fitness
      - recompute_gate
      - create_candidate_branch
      - create_candidate_commit
    write:
      - disposable_candidate_worktree
      - candidate_branch_ref
  deny:
    actions:
      - merge
      - approve_pr
      - push
      - push_to_main
      - open_pull_request
      - modify_main
      - modify_caller_worktree
  exact_transaction:
    - changed_rule_files_only
    - VERSION
    - CHANGELOG.md
    - distilled_precedent
    - pr_shaped_report
    - sanitized_manifest
  outcome: local_candidate_ready
  human_review_required: true
  auto_merge: false

human_only:
  actions: [review_candidate_commit, merge_candidate]
  required: [independent_review, explicit_human_decision]

local_required:
  - isolated_worktree
  - exact_base_commit_binding
  - atomic_candidate_ref_update
  - rollback_on_error
  - separate_evolver_and_publisher_roles

notes: >
  Runtime guards reduce accidental/invalid changes but cannot enforce OS-level
  SoD against an unrestricted process. The local connector creates only a
  review candidate; a human remains responsible for any later merge.
