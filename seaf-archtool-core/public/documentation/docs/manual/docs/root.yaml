      (
        {
          "dateOne": $params.date ? $params.date : $params.fromDate,
          "dateTwo": $params.date ? $params.date : $params.toDate
        }
      )

  # *****************************************  
  #                 Шаблоны
  # *****************************************  
  archtool.templates:         # Пример генерации markdown документа по шаблону
    location: SEAF.ArchTool/Руководство/Документы/Шаблоны
    description: Шаблоны
    type: markdown
    autor: R.Piontik        # Кастомное поле - Автор документа
    approvers:              # Кастомное поле - список согласующих
      - P.Petrov
      - S.Sidorov
      - N.Nikolaev
    source: >               # JSONata запрос для формирования параметров шаблона
      (
        {
          "id": $self._id,              /* Идентификатор документа */
          "autor": $self.autor,         /* Автор документа */
          "approvers": $self.approvers, /* Согласующие */
          "docs": [docs.$spread().{     /* Другие документы автора */
            "id": $keys()[0],
            "title": *.description,
            "autor": *.autor
          }][autor=$self.autor]
        }
      )
    subjects:
      - archtool.front
      - archtool.front.spa
      - archtool.front.spa.blank
      - archtool.front.spa.blank.doc
    template: templates.md  # Шаблон документа
  archtool.templates.pml: # Пример генерации PlantUML документа по шаблону
    type: PlantUML
    source: >
      (
        {
          "entities": $distinct([     /* Получаем все использованные сущности при описании архитектуры */ 
              components.*.entity
          ])
        }
      )
    subjects:
      - archtool.front
      - archtool.front.spa
      - archtool.front.spa.blank
      - archtool.front.spa.blank.doc
    template: examples/template.puml
  archtool.templates.asyncapi: # Пример генерации AsyncAPI документа по шаблону
    type: AsyncAPI
    source: >
      (
        $BODY := $mergedeep([components.*.asyncapi]);
        {
            "content": [$BODY.$spread().{
                "field": $keys()[0],
                "body": $string($lookup($, $keys()[0]))
            }]
        }
      )
    template: examples/asyncapi_template.json
  archtool.templates.openapi: # Пример генерации OpenAPI документа по шаблону
    type: OpenAPI
    source: >
      (
        $BODY := $mergedeep([components.*.openapi]);
        {
            "content": [$BODY.$spread().{
                "field": $keys()[0],
                "body": $string($lookup($, $keys()[0]))
            }]
        }
      )
    template: examples/openapi_template.json
