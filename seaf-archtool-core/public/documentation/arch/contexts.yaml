contexts:   # Контексты представления архитектурных компонентов
    archtool:                                 # Идентификатор контекста
        title: Общая архитектура SEAF.ArchTool     # Название контекста
        location: SEAF.ArchTool                    # Размещение документа в дереве навигации
        components:                         # Компоненты входящие в контекст
            - archtool.front
            - archtool.user
            - archtool.plantuml
            - archtool.gitlab
            - archtool.web
    archtool.uml_options:
        title: Демонстрация UML опций контекста
        uml:
            $before: >                      # Добавляем легенду в контекст
                legend top left
                    Легенда, которая будет выводиться
                    вне зависимости от результата работы контекста
                end legend
            $after: >                       # Добавляем произвольный компонент в диаграмму
                component "Произвольный компонент" as test 
        components:                         # Компоненты входящие в контекст
            - archtool.front
            - archtool.user
            - archtool.plantuml
            - archtool.gitlab
            - archtool.web
    archtool.front:
        title: Контейнерная архитектура SEAF.ArchTool
        location: SEAF.ArchTool/Контейнерная архитектура
        components:
            - archtool.browser.*
            - archtool.front.*
            - archtool.gitlab.*
            - archtool.plantuml.*
            - archtool.web
    archtool.front.spa:
        title: Компонентная архитектура SEAF.ArchTool
        location: SEAF.ArchTool/Компонентная архитектура
        components:
            - archtool.front.spa.*
    archtool.custom:
        title: Компоненты эксперта R.Piontik
        location: SEAF.ArchTool/Контекст по источнику
        extra-links: false  # Отключаем вывод связанных компонентов, явно не определенных в контексте
                            # Определяем источник данных для контекста.
        source: >           # Отбираем все компоненты у которых кастомное поле "expert" = "R.Piontik"
            (               
                $ ~> | $ | {
                    "components": $merge(components.$spread().(
                        $.*.expert = 'R.Piontik' ? $ : {}
                    )) 
                } |
            )
        components:
            - archtool.*      # Выводим все компоненты домена archtool
    archtool.front.spa.blank:
        title: Карточка объекта
        components:
            - archtool.front.spa.blank.*
    archtool.front.spa.blank.doc:
        title: Документ
        components:
            - archtool.front.spa.blank.doc.*
    archtool.sequence:
        title: Диаграмма взаимодействия SEAF.ArchTool
        icon: settings_ethernet
        location: SEAF.ArchTool/Диаграмма взаимодействия
        presentation: plantuml
        uml: ../docs/sequence.puml

